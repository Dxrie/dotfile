source = /home/dxrie/.cache/wal/colors-hyprland.conf

# BACKGROUND
background {
    monitor =
    path = /home/dxrie/Pictures/.wallpapers/wpp1.jpg
    blur_passes = 3 # Increased for a frostier look
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
    ignore_empty_input = true
}

# TIME
label {
    monitor =
    text = $TIME
    color = $color7
    font_size = 120
    font_family = JetBrains Mono ExtraBold
    position = 0, -150
    halign = center
    valign = top
    shadow_passes = 2
}

# DATE
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = $color6
    font_size = 25
    font_family = JetBrains Mono
    position = 0, -400
    halign = center
    valign = top
}

# USER GREETING
label {
    monitor =
    text = Hello, $USER
    color = $color7
    font_size = 20
    font_family = JetBrains Mono Bold
    position = 0, 50
    halign = center
    valign = center
}

# PROFILE PICTURE
image {
    monitor =
    path = /home/dxrie/Pictures/profile_picture/Dxrie.jpg
    size = 120 # Slightly larger
    border_size = 4
    border_color = $color6
    position = 0, 180
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $color6
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = $color7
    fade_on_empty = false
    placeholder_text = Type Password...
    hide_input = false
    rounding = 20 # Softer rounding
    check_color = $color3
    fail_color = $color1
    position = 0, -120
    halign = center
    valign = center
}

# BATTERY (NEW COMPONENT)
label {
    monitor =
    text = cmd[update:1000] echo -e "$(cat /sys/class/power_supply/BAT1/capacity)% <span>   </span>"
    color = $color7
    font_size = 16
    font_family = JetBrains Mono
    position = -20, -20
    halign = right
    valign = top
}

label {
    monitor =
    text = <span>  </span>
    color = $color6
    font_size = 18
    position = 0, 30
    halign = center
    valign = bottom
}
